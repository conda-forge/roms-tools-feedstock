{% set name = "roms-tools" %}
{% set version = "3.7.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/roms_tools-{{ version }}.tar.gz
  sha256: 62d62e98a4326a2427d024e66d8bf3158ed5b2615185f9cf56f457ad3368c7af

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0.0
    - wheel
    - setuptools-scm >=7.0
    - check-manifest
    - pip
  run:
    - python >={{ python_min }}
    - xarray >=2022.6.0,<2025.8.0
    - numpy >2.0,<2.3
    - pooch
    - matplotlib-base
    - cartopy
    - packaging
    - scipy >=1.18.0
    - gcm_filters >=0.5.1
    - netcdf4
    - pyyaml
    - pyamg
    - bottleneck
    - regionmask >=0.11.0
    - xgcm >=0.9.0,<0.10.0
    - numba >=0.61.2
    - pydantic >2,<3
    - dask
    - xesmf >=0.8.8
    - gcsfs
    - copernicusmarine
    - zarr
    - gsw
    - imageio-ffmpeg
    - click >=8.3.2
    - h5py
    - h5netdcdf

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - roms_tools
  commands:
    - pip check

about:
  home: https://github.com/CWorthy-ocean/roms-tools
  summary: Tools for creating input files for UCLA-ROMS simulations
  license: Apache-2.0
  license_file: LICENSE
  description: |
    **ROMS-Tools** is a Python package designed for creating the input files necessary to run a UCLA-ROMS simulation, with or without MARBL biogeochemistry. 
    The package simplifies the process of generating grid, tidal forcing, surface forcing, initial conditions, boundary forcing, river forcing, carbon dioxide removal (CDR) forcing, and nesting.
    In addition to input generation, ROMS-Tools includes utilities for postprocessing and analysis, particularly for CDR monitoring, reporting, and verification (MRV).

extra:
  recipe-maintainers:
    - NoraLoose
    - ScottEilerman
